<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="format-detection" content="telephone=no"/>
<meta name="format-detection" content="email=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="x5-orientation" content="portrait"/>
<meta name="x5-page-mode" content="app"/>
<meta name="msapplication-tap-highlight" content="no"/>
<title>主持人端 - 卡牌桌游</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>
<!-- 授权验证遮罩 -->
<div id="authOverlay" class="modal show">
  <div class="modal-content" style="text-align:center;margin:10px;padding:20px;">
    <div style="font-size:48px;margin-bottom:12px;">🎴</div>
    
    <!-- 登录表单 -->
    <div id="loginForm">
      <h2 style="margin:0 0 6px 0;color:#323233;font-size:18px;">主持人端</h2>
      <p style="color:#969799;margin:0 0 16px 0;font-size:13px;">正在加载...</p>
    </div>
    
    <div style="margin-top:20px;">
      <a href="player.html" style="color:#969799;font-size:14px;text-decoration:none;">
        没有授权码？以玩家身份进入 →
      </a>
    </div>
  </div>
</div>

<!-- 顶部工具栏 -->
<div id="toolbar" class="host-toolbar" style="display:none;">
  <div class="host-toolbar-left">
    <span class="host-toolbar-user">👤 <span id="currentUserName"></span></span>
    <span id="networkStatusText" class="host-toolbar-status offline">离线</span>
    <span id="onlineInfo" class="host-toolbar-online" style="display:none;">
      房间: <strong id="roomIdDisplay"></strong>
      <span id="playerCount">| 在线: 0</span>
    </span>
    <a href="index.html" class="btn btn-default btn-mini" style="margin-left:10px;">← 返回选择</a>
  </div>
  <div class="host-toolbar-right">
    <button class="btn btn-success btn-small" id="btnCreateRoom" onclick="createRoom()">创建房间</button>
    <button class="btn btn-danger btn-small" id="btnDisconnect" style="display:none;" onclick="disconnectNetwork()">断开</button>
    <button class="btn btn-default btn-small" onclick="doLogout()">退出</button>
  </div>
</div>

<!-- 主布局：左侧边栏 + 右侧主区域 -->
<div id="mainLayout" class="host-layout" style="display:none;">

  <!-- 左侧边栏 -->
  <div class="host-sidebar">
    <!-- 卡池管理 -->
    <div class="sidebar-section">
      <div class="sidebar-section-title">卡池管理</div>
      <div class="sidebar-input-row">
        <input type="text" id="poolNameInput" class="input" placeholder="新卡池名称">
        <button class="btn btn-success btn-mini" onclick="createPool()">创建</button>
      </div>
      <div id="sidebarPoolList" class="sidebar-pool-list"></div>
    </div>

    <!-- 添加卡牌 -->
    <div class="sidebar-section">
      <div class="sidebar-section-title">添加卡牌</div>
      <div class="sidebar-input-row">
        <select id="targetPoolSelect" class="input"><option value="">选择卡池</option></select>
        <button class="btn btn-primary btn-mini" onclick="document.getElementById('uploadImgs').click()">上传</button>
        <input type="file" id="uploadImgs" multiple accept="image/*" style="display:none">
      </div>
    </div>

    <!-- 玩家管理 -->
    <div class="sidebar-section">
      <div class="sidebar-section-title">玩家管理</div>
      <div class="sidebar-input-row">
        <input type="text" id="playerNameInput" class="input" placeholder="新玩家名称">
        <button class="btn btn-primary btn-mini" onclick="addPlayer()">添加</button>
      </div>
      <div id="sidebarPlayerList" class="sidebar-player-list"></div>
    </div>

    <!-- 数据管理 -->
    <div class="sidebar-section sidebar-section-bottom">
      <div class="sidebar-actions">
        <button class="btn btn-danger btn-small btn-block" onclick="clearAllData()">清除数据</button>
        <button class="btn btn-default btn-small btn-block" onclick="resetAllHands()">重置手牌</button>
      </div>
    </div>
  </div>

  <!-- 右侧主区域 -->
  <div class="host-main">
    <!-- 模式切换标签 -->
    <div class="host-mode-tabs">
      <button class="pool-tab active" id="tabCardMode" onclick="switchMode('card')">卡牌模式</button>
      <button class="pool-tab" id="tabBattleMode" onclick="switchMode('battle')">战场模式</button>
    </div>

    <!-- 卡牌模式主内容 -->
    <div id="cardModeContainer" class="host-main-content">
      <!-- 桌面公共区 -->
      <div class="host-section">
        <div class="card-title">
          <span>桌面公共区</span>
          <button class="btn btn-default btn-small" onclick="clearTable()">清空</button>
        </div>
        <div id="tableArea" class="card-grid empty"><span>桌面为空</span></div>
      </div>

      <!-- 卡池展示区 -->
      <div class="host-section">
        <div class="card-title">卡池展示</div>
        <div id="poolTabs" class="tabs"></div>
        <div id="cardPoolsArea" style="margin-top:12px;"></div>
      </div>

      <!-- 游戏日志 -->
      <div class="host-section">
        <div class="card-title">游戏日志</div>
        <div class="log-box" id="gameLog">
          <div id="logContent"></div>
        </div>
      </div>

      <!-- 弃牌堆（可折叠） -->
      <div class="host-section host-discard-section">
        <div class="card-title" onclick="toggleDiscardSection()" style="cursor:pointer;">
          <span>弃牌堆 (<span id="discardCount">0</span>) ▾</span>
          <div style="display:flex;gap:5px;flex-wrap:wrap;" onclick="event.stopPropagation();">
            <button class="btn btn-default btn-small" onclick="toggleDiscardSelect()">选择</button>
            <select id="recoverPoolSelect" class="input" style="display:none;width:auto;min-height:28px;padding:3px 20px 3px 5px;font-size:11px;">
              <option value="">卡池</option>
            </select>
            <button class="btn btn-success btn-small" id="recoverBtn" style="display:none" onclick="recoverToPool()">回收</button>
            <button class="btn btn-danger btn-small" id="cancelDiscardBtn" style="display:none" onclick="cancelDiscardSelect()">取消</button>
          </div>
        </div>
        <div id="discardAreaWrapper">
          <div id="discardArea" class="card-grid empty"><span>弃牌堆为空</span></div>
        </div>
      </div>
    </div>

    <!-- 战场模式主内容 -->
    <div id="battleModeContainer" class="battlefield-container">
      <!-- 战场导航 -->
      <div class="battlefield-nav">
        <div class="nav-left">
          <span style="font-size:14px;font-weight:600;">战场</span>
          <button class="btn btn-success btn-small" onclick="createBattleRoom()">+ 创建战场</button>
          <button class="btn btn-default btn-mini" onclick="toggleMapSettings()">地图设置</button>
          <button class="btn btn-primary btn-mini" onclick="toggleHostPlaceMode()">放置卡牌</button>
        </div>
        <div class="nav-right">
        </div>
      </div>

      <!-- 战场房间列表 -->
      <div id="battleRoomsList" class="battle-rooms-sidebar"></div>

      <!-- 战场主体布局：左侧卡牌 + 中间战场 + 右侧token信息 -->
      <div class="battlefield-main-layout">
        <!-- 左侧：卡牌选择区 -->
        <div id="hostQuickPlace" class="battlefield-card-panel">
          <div class="card-panel-title">选择卡牌放置到战场</div>
          <div id="hostQuickCardsGrid" class="battlefield-cards-grid"></div>
        </div>

        <!-- 中间：战场网格 -->
        <div class="battlefield-center">
          <!-- 地图设置面板 -->
          <div id="mapSettingsPanel" class="map-settings-panel">
            <div class="map-settings-row">
              <label>名称</label>
              <input type="text" id="mapName" class="input" value="默认战场" style="font-size:12px;min-height:30px;padding:5px 8px;">
            </div>
            <div class="map-settings-row">
              <label>列数</label>
              <input type="number" id="mapWidth" class="input" value="8" min="2" max="30" style="font-size:12px;min-height:30px;padding:5px 8px;">
              <label>行数</label>
              <input type="number" id="mapHeight" class="input" value="6" min="2" max="30" style="font-size:12px;min-height:30px;padding:5px 8px;">
              <label>格子</label>
              <input type="number" id="mapCellSize" class="input" value="60" min="30" max="120" style="font-size:12px;min-height:30px;padding:5px 8px;">
              <span style="color:#999;font-size:11px;">px</span>
            </div>
            <div class="map-settings-row">
              <label>背景色</label>
              <input type="color" id="mapBgColor" value="#2c3e50" style="width:36px;height:30px;border:1px solid #ddd;border-radius:3px;padding:1px;">
              <label>网格色</label>
              <input type="color" id="mapGridColor" value="#34495e" style="width:36px;height:30px;border:1px solid #ddd;border-radius:3px;padding:1px;">
              <button class="btn btn-primary btn-small" onclick="applyBattleMapSettings()">应用</button>
            </div>
            <div class="map-settings-row">
              <label>背景图</label>
              <input type="file" id="mapBgImageInput" accept="image/*" style="font-size:11px;">
              <button class="btn btn-default btn-small" onclick="removeMapBgImage()">移除</button>
            </div>
          </div>

          <!-- 战场网格 -->
          <div class="battlefield-scroll" id="battlefieldScroll">
            <div id="battlefieldZoomContainer" class="battlefield-zoom-container">
              <div id="battlefieldGrid" class="battlefield-grid"></div>
            </div>
            <!-- 缩放控制 -->
            <div class="battlefield-zoom-controls">
              <button class="zoom-btn" onclick="zoomBattlefield(0.2)" title="放大">+</button>
              <div class="zoom-level" id="zoomLevelDisplay">100%</div>
              <button class="zoom-btn" onclick="zoomBattlefield(-0.2)" title="缩小">−</button>
              <button class="zoom-btn" onclick="resetBattlefieldZoom()" title="重置" style="font-size:14px;">⟲</button>
            </div>
            <div class="battlefield-zoom-hint">滚轮缩放 | 左键拖拽平移</div>
          </div>

          <!-- 战场日志 -->
          <div id="battleLogContainer" class="battle-log" style="display:none;"></div>
        </div>

        <!-- 右侧：Token信息面板 -->
        <div id="tokenActionsPanel" class="battlefield-token-panel">
          <div class="token-panel-title">Token 信息</div>
          <div class="token-preview-large">
            <img id="tokenPreviewImg" src="" alt="">
          </div>
          <div class="token-info">
            <div class="token-name" id="tokenPreviewName"></div>
            <div class="token-owner" id="tokenPreviewOwner"></div>
          </div>
          <div class="token-actions">
            <button class="btn btn-default btn-small" onclick="rotateBattleToken()">旋转</button>
            <button class="btn btn-default btn-small" onclick="flipBattleToken()">翻转</button>
            <button class="btn btn-danger btn-small" onclick="removeBattleToken()">删除</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 玩家手牌弹窗 -->
<div id="playerHandModal" class="modal">
  <div class="modal-content" style="background:#1a1a1a;color:#fff;margin:10px;padding:14px;">
    <button class="modal-close" onclick="closePlayerHandModal()">✕</button>
    <h2 id="modalPlayerName" style="color:#fff;margin-bottom:10px;text-align:center;font-size:15px;"></h2>
    <div id="modalPlayerHand" class="card-grid" style="background:#2a2a2a;justify-content:flex-start;max-height:50vh;overflow-y:auto;"></div>
    <div class="modal-actions" style="flex-direction:column;gap:6px;">
      <div style="display:flex;gap:6px;">
        <button class="btn btn-success btn-small" onclick="dealToPlayer()">发牌</button>
        <select id="dealPoolSelect" class="input" style="flex:1;min-height:34px;font-size:12px;"></select>
      </div>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-primary btn-small" onclick="takeBackPlayerCards()">回收</button>
        <button class="btn btn-danger btn-small" onclick="discardPlayerCards()">弃置</button>
      </div>
    </div>
  </div>
</div>

<!-- 放大模态框 -->
<div id="cardModal" class="modal modal-image-viewer">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <img id="modalImg" src="" alt="">
    <div id="modalName" class="modal-name"></div>
  </div>
</div>

<!-- 自定义确认弹窗 -->
<div id="confirmModal" class="modal">
  <div class="modal-content confirm-modal">
    <div class="confirm-icon">⚠️</div>
    <div class="confirm-message" id="confirmMessage"></div>
    <div class="modal-actions">
      <button class="btn btn-default" onclick="closeConfirm()">取消</button>
      <button class="btn btn-danger" id="confirmBtn" onclick="doConfirm()">确定</button>
    </div>
  </div>
</div>

<script src="host.js"></script>
<script>
// ==================== 主持人端初始化 ====================
window.addEventListener('load', () => {
    // 直接进入主界面
    showMainInterface();
});

function showMainInterface(userName) {
    document.getElementById('authOverlay').style.display = 'none';
    document.getElementById('toolbar').style.display = 'flex';
    document.getElementById('mainLayout').style.display = 'flex';
    document.getElementById('currentUserName').textContent = '主持人';
    
    if (typeof initHost === 'function') initHost();
}
</script>

<!-- 自定义提示弹窗 -->
<div id="toastModal" class="modal toast-modal">
    <div class="toast-content">
        <div id="toastMessage" class="toast-message"></div>
        <button class="toast-btn" onclick="closeToast()">确定</button>
    </div>
</div>
</body>
</html>
