<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="format-detection" content="telephone=no"/>
<meta name="format-detection" content="email=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="x5-orientation" content="portrait"/>
<meta name="x5-page-mode" content="app"/>
<meta name="msapplication-tap-highlight" content="no"/>
<title>玩家端 - 卡牌桌游</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>
</head>
<body>
<a href="index.html" class="back-link">← 返回选择</a>

<!-- 网络状态栏 -->
<div class="status-bar">
    <div class="status-info">
        <span class="status-dot offline" id="statusDot"></span>
        <span id="statusText">未连接</span>
    </div>
    <div class="status-actions" id="joinRoomForm" style="width:100%;flex-wrap:wrap;gap:6px;">
        <input type="text" id="roomIdInput" class="input" placeholder="输入房间号" style="min-height:34px;padding:6px 10px;font-size:13px;flex:1;min-width:80px;">
        <button class="btn btn-success btn-small" onclick="joinRoom()" style="min-height:34px;">加入</button>
    </div>
    <div class="status-info" id="onlineInfo" style="display:none;flex-wrap:wrap;gap:6px;">
        <span>已连接 - 等待主持人...</span>
        <button class="btn btn-default btn-small" onclick="disconnectNetwork()">断开</button>
    </div>
</div>

<!-- 连接提示 -->
<div class="container">
    <div class="empty-state" id="connectionTip">
        <p style="margin-bottom:8px;">🎴 卡牌桌游</p>
        <p style="font-size:13px;color:#969799;">请联系主持人获取房间号，然后输入上方加入房间</p>
    </div>

    <!-- 玩家选择 -->
    <div id="playerSelectSection" class="card" style="display:none;">
        <div class="card-title">选择你的角色</div>
        <div id="playerButtons" class="player-list"></div>
        <div class="empty-state" style="padding:16px 0;">请由主持人添加玩家</div>
    </div>

    <!-- 玩家界面（登录后显示） -->
    <div id="playerInterface" style="display:none;">
        <!-- 玩家头部 -->
        <div class="nav-bar">
            <div class="nav-title">
                <span id="currentPlayerName"></span>
            </div>
            <div class="nav-actions">
                <button class="btn btn-danger btn-small" onclick="clearPlayerData()">清除</button>
            </div>
        </div>

        <!-- 游戏日志 -->
        <div class="card" style="margin-top:0;">
            <div class="log-box" id="gameLog">
                <div id="logContent"></div>
            </div>
        </div>

        <!-- 抽卡区 -->
        <div class="card">
            <div class="card-title">抽卡</div>
            <div class="input-row">
                <select id="drawPoolSelect" class="input"><option value="">-- 选择卡池 --</option></select>
                <button class="btn btn-success btn-small" onclick="dealCardToMe()">抽卡</button>
            </div>
            <div id="poolHint" class="empty-state" style="padding:8px 0;font-size:12px;">选择卡池后点击抽卡</div>
        </div>

        <!-- 手牌区 -->
        <div class="card">
            <div class="card-title">
                <span>我的手牌</span>
                <div style="display:flex;gap:5px;flex-wrap:wrap;">
                    <button class="btn btn-default btn-small" onclick="discardLastCard()">弃最后</button>
                    <button class="btn btn-primary btn-small" onclick="showGiftPanel()">赠送</button>
                </div>
            </div>
            <div id="playerHandArea" class="hand-area"></div>
        </div>

        <!-- 赠送面板 -->
        <div id="giftPanel" class="modal">
            <div class="modal-content" style="margin:10px;padding:14px;">
                <button class="modal-close" onclick="closeGiftPanel()">✕</button>
                <h3 class="modal-title">赠送卡牌</h3>
                <p style="color:#999;font-size:12px;margin-bottom:8px;">请选择要赠送的卡牌和目标玩家</p>
                <div id="giftCardList" class="hand-area" style="max-height:140px;overflow-y:auto;background:#fafafa;"></div>
                <div id="giftCardHint" class="empty-state" style="display:none;">请先选择一张卡牌</div>
                <div id="giftTargetSection" style="display:none;margin-top:10px;">
                    <p style="color:#666;font-size:12px;margin-bottom:5px;">选择接收玩家：</p>
                    <div id="giftTargetList" class="player-list" style="max-height:100px;overflow-y:auto;"></div>
                </div>
                <div style="margin-top:10px;">
                    <button class="btn btn-success btn-block" id="confirmGiftBtn" onclick="confirmGift()" disabled>确认赠送</button>
                </div>
            </div>
        </div>

        <!-- 桌面区 -->
        <div class="card">
            <div class="card-title">桌面公共区</div>
            <div id="tableArea" class="card-grid empty"><span>桌面为空</span></div>
        </div>

        <!-- 弃牌堆 -->
        <div class="card">
            <div class="card-title">弃牌堆</div>
            <div id="discardArea" class="card-grid empty"><span>弃牌堆为空</span></div>
        </div>

        <!-- 战场区域 -->
        <div class="card player-battlefield">
            <div class="card-title">
                <span>战场</span>
                <div style="display:flex;gap:5px;flex-wrap:wrap;">
                    <button class="btn btn-default btn-small" onclick="togglePlayerBattleCards()">卡牌</button>
                    <button class="btn btn-success btn-small" id="btnJoinBattle" onclick="joinCurrentBattle()">加入战场</button>
                    <button class="btn btn-danger btn-small" id="btnLeaveBattle" style="display:none;" onclick="leaveCurrentBattle()">离开</button>
                </div>
            </div>

            <!-- 战场房间选择 -->
            <div id="playerBattleRooms" class="player-battle-rooms" style="display:none;"></div>

            <!-- 战场卡牌选择 -->
            <div id="playerBattleCardsPanel" class="battle-cards-panel" style="display:none;">
                <div class="battle-cards-title">点击选择卡牌，再点击空格子放置</div>
                <div id="playerBattleCardsGrid" class="battle-cards-grid"></div>
            </div>

            <!-- 放置模式提示 -->
            <div id="playerPlaceModeHint" class="place-mode-hint" style="display:none;">
                已选择「<span id="playerPlaceModeCardName"></span>」，点击空格放置 | <a href="#" onclick="playerCancelPlaceMode();return false;" style="color:#333;text-decoration:underline;">取消</a>
            </div>

            <!-- Token 操作面板 -->
            <div id="playerTokenActionsPanel" class="token-actions-panel">
                <div class="token-preview"><img id="playerTokenPreviewImg" src="" alt=""></div>
                <div class="token-info">
                    <div class="token-name" id="playerTokenPreviewName"></div>
                    <div class="token-owner" id="playerTokenPreviewOwner"></div>
                </div>
                <button class="btn btn-default btn-small" onclick="playerRotateBattleToken()">旋转</button>
                <button class="btn btn-default btn-small" onclick="playerFlipBattleToken()">翻转</button>
                <button class="btn btn-danger btn-small" onclick="playerRemoveBattleToken()">删除</button>
                <button class="btn btn-default btn-small" onclick="playerDeselectBattleToken()">取消</button>
            </div>

            <!-- 战场日志 -->
            <div id="playerBattleLog" class="battle-log" style="display:none;"></div>

            <!-- 战场网格 -->
            <div id="playerBattlefieldScroll" class="battlefield-scroll player-battlefield-scroll">
                <div id="playerBattlefieldZoomContainer" class="battlefield-zoom-container">
                    <div id="playerBattlefieldGrid" class="battlefield-grid"></div>
                </div>
                <!-- 缩放控制 -->
                <div class="battlefield-zoom-controls">
                    <button class="zoom-btn" onclick="playerZoomBattlefield(0.2)" title="放大">+</button>
                    <div class="zoom-level" id="playerZoomLevelDisplay">100%</div>
                    <button class="zoom-btn" onclick="playerZoomBattlefield(-0.2)" title="缩小">−</button>
                    <button class="zoom-btn" onclick="resetPlayerBattlefieldZoom()" title="重置" style="font-size:14px;">⟲</button>
                </div>
            </div>

            <!-- 未加入提示 -->
            <div id="playerBattleEmpty" class="empty-state">
                <p>主持人未创建战场，或你尚未加入</p>
            </div>
        </div>
    </div>
</div>

<!-- 放大模态框 -->
<div id="cardModal" class="modal modal-image-viewer">
    <div class="modal-content">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <img id="modalImg" src="" alt="">
        <div id="modalName" class="modal-name"></div>
    </div>
</div>

<script src="player.js"></script>
</body>
</html>
