<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=no, user-scalable=no"/>
<meta name="format-detection" content="telephone=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>玩家端 - 卡牌桌游</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
<a href="index.html" class="back-link">← 返回选择</a>

<!-- 网络状态栏 -->
<div class="status-bar">
    <div class="status-info">
        <span class="status-dot offline" id="statusDot"></span>
        <span id="statusText">未连接</span>
    </div>
    <div class="status-actions" id="joinRoomForm">
        <input type="text" id="roomIdInput" class="input" placeholder="输入房间号" style="min-height:36px;padding:6px 10px;font-size:13px;width:120px;flex-shrink:0;">
        <button class="btn btn-success btn-small" onclick="joinRoom()" style="min-height:36px;">加入</button>
    </div>
    <div class="status-info" id="onlineInfo" style="display:none;">
        <span>已连接 - 等待主持人...</span>
        <button class="btn btn-default btn-small" onclick="disconnectNetwork()">断开</button>
    </div>
</div>

<!-- 连接提示 -->
<div class="container">
    <div class="empty-state" id="connectionTip">
        <p style="margin-bottom:8px;">🎴 卡牌桌游</p>
        <p style="font-size:13px;color:#969799;">请联系主持人获取房间号，然后输入上方加入房间</p>
    </div>

    <!-- 玩家选择 -->
    <div id="playerSelectSection" class="card" style="display:none;">
        <div class="card-title">选择你的角色</div>
        <div id="playerButtons" class="player-list"></div>
        <div class="empty-state" style="padding:16px 0;">请由主持人添加玩家</div>
    </div>

    <!-- 玩家界面（登录后显示） -->
    <div id="playerInterface" style="display:none;">
        <!-- 玩家头部 -->
        <div class="nav-bar" style="border-radius:0 0 20px 20px;padding:16px;">
            <div class="nav-title">
                <span id="currentPlayerName"></span>
            </div>
            <div class="nav-actions">
                <button class="btn btn-danger btn-small" onclick="clearPlayerData()">清除数据</button>
            </div>
        </div>

        <!-- 游戏日志 -->
        <div class="card" style="margin-top:12px;">
            <div class="log-box" id="gameLog">
                <div id="logContent"></div>
            </div>
        </div>

        <!-- 抽卡区 -->
        <div class="card">
            <div class="card-title">抽卡</div>
            <div class="input-row">
                <select id="drawPoolSelect" class="input"><option value="">-- 选择卡池 --</option></select>
                <button class="btn btn-success" onclick="dealCardToMe()">抽一张</button>
            </div>
            <div id="poolHint" class="empty-state" style="padding:12px 0;">选择卡池后点击抽卡</div>
        </div>

        <!-- 手牌区 -->
        <div class="card">
            <div class="card-title">
                <span>我的手牌</span>
                <div style="display:flex;gap:8px;">
                    <button class="btn btn-default btn-small" onclick="discardLastCard()">弃最后</button>
                    <button class="btn btn-primary btn-small" onclick="showGiftPanel()">赠送</button>
                </div>
            </div>
            <div id="playerHandArea" class="hand-area"></div>
        </div>

        <!-- 赠送面板 -->
        <div id="giftPanel" class="modal">
            <div class="modal-content">
                <button class="modal-close" onclick="closeGiftPanel()">✕</button>
                <h3 class="modal-title">赠送卡牌</h3>
                <p style="color:#969799;font-size:14px;margin-bottom:12px;">请选择要赠送的卡牌和目标玩家</p>
                <div id="giftCardList" class="hand-area" style="max-height:180px;overflow-y:auto;background:#f7f8fa;"></div>
                <div id="giftCardHint" class="empty-state" style="display:none;">请先选择一张卡牌</div>
                <div id="giftTargetSection" style="display:none;margin-top:16px;">
                    <p style="color:#646566;font-size:14px;margin-bottom:8px;">选择接收玩家：</p>
                    <div id="giftTargetList" class="player-list" style="max-height:150px;overflow-y:auto;"></div>
                </div>
                <div style="margin-top:16px;">
                    <button class="btn btn-success btn-block" id="confirmGiftBtn" onclick="confirmGift()" disabled>确认赠送</button>
                </div>
            </div>
        </div>

        <!-- 桌面区 -->
        <div class="card">
            <div class="card-title">桌面公共区</div>
            <div id="tableArea" class="card-grid empty"><span>桌面为空</span></div>
        </div>

        <!-- 弃牌堆 -->
        <div class="card">
            <div class="card-title">弃牌堆</div>
            <div id="discardArea" class="card-grid empty"><span>弃牌堆为空</span></div>
        </div>
    </div>
</div>

<!-- 放大模态框 -->
<div id="cardModal" class="modal modal-image-viewer">
    <div class="modal-content" style="background:transparent;box-shadow:none;">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <img id="modalImg" src="" alt="">
        <div id="modalName" class="modal-name"></div>
    </div>
</div>

<script src="player.js"></script>
</body>
</html>
