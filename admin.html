<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <meta name="format-detection" content="telephone=no"/>
    <meta name="format-detection" content="email=no"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="x5-orientation" content="portrait"/>
    <meta name="x5-page-mode" content="app"/>
    <meta name="msapplication-tap-highlight" content="no"/>
    <title>激活码注册机</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 40px 15px 20px;
        }
        
        .admin-container {
            background: #fff;
            border-radius: 0;
            padding: 20px 15px;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }
        
        .admin-header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .admin-header h1 {
            font-size: 20px;
            font-weight: 600;
            color: #1AAD19;
            margin-bottom: 5px;
        }
        
        .admin-header p {
            font-size: 12px;
            color: #999;
        }
        
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #333;
            margin-bottom: 6px;
        }
        
        .code-box {
            background: #1AAD19;
            color: #fff;
            padding: 14px;
            border-radius: 4px;
            margin: 14px 0;
            text-align: center;
        }
        
        .code-box .label {
            font-size: 11px;
            opacity: 0.9;
            margin-bottom: 6px;
        }
        
        .code-box .code {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 2px;
            font-family: monospace;
            word-break: break-all;
            line-height: 1.5;
        }
        
        .tips-box {
            background: #F6FBF6;
            border: 1px solid #D7EED9;
            border-radius: 4px;
            padding: 12px;
            margin-top: 16px;
        }
        
        .tips-box h4 {
            font-size: 13px;
            color: #1AAD19;
            margin-bottom: 8px;
        }
        
        .tips-box ol {
            margin: 0;
            padding-left: 16px;
            font-size: 12px;
            color: #666;
            line-height: 1.7;
        }
        
        .admin-footer {
            text-align: center;
            margin-top: 16px;
        }
        
        .admin-footer a {
            color: #1AAD19;
            text-decoration: none;
            font-size: 13px;
        }
        
        @media (max-width: 480px) {
            body {
                padding: 30px 10px 15px;
            }
            
            .admin-container {
                padding: 15px 12px;
            }
            
            .admin-header h1 {
                font-size: 18px;
            }
            
            .code-box .code {
                font-size: 14px;
                letter-spacing: 1px;
            }
            
            .tips-box ol {
                font-size: 11px;
            }
            
            .admin-footer a {
                font-size: 12px;
            }
        }
        
        @media (max-width: 400px) {
            body {
                padding: 20px 8px 10px;
            }
            
            .admin-container {
                padding: 12px 10px;
            }
            
            .admin-header h1 {
                font-size: 16px;
            }
            
            .admin-header p {
                font-size: 11px;
            }
            
            .form-label {
                font-size: 12px;
            }
            
            .code-box {
                padding: 10px;
            }
            
            .code-box .code {
                font-size: 12px;
                letter-spacing: 0;
            }
            
            .tips-box {
                padding: 8px;
            }
            
            .tips-box h4 {
                font-size: 12px;
            }
            
            .tips-box ol {
                font-size: 10px;
                line-height: 1.5;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>🔐 激活码注册机</h1>
            <p>一机一码，永久授权</p>
        </div>
        
        <label class="form-label">机器码：</label>
        <input type="text" id="machineCode" class="input" placeholder="请输入用户的机器码" style="margin-bottom:12px;">
        
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
            <button class="btn btn-primary" style="flex:1;min-width:100px;" onclick="generateCode()">生成激活码</button>
            <button class="btn btn-default" style="flex:1;min-width:70px;" onclick="resetForm()">清空</button>
        </div>
        
        <div id="codeDisplay" class="code-box" style="display:none;">
            <div class="label">激活码</div>
            <div id="activationCode" class="code"></div>
        </div>
        
        <button id="copyBtn" class="btn btn-success btn-block" style="display:none;margin-top:10px;" onclick="copyCode()">
            复制激活码
        </button>
        
        <div class="tips-box">
            <h4>💡 使用说明</h4>
            <ol>
                <li>用户打开 host.html 注册页面，获取自己的机器码</li>
                <li>用户将机器码发送给您</li>
                <li>在本页面输入机器码，点击"生成激活码"</li>
                <li>复制生成的激活码发送给用户</li>
                <li>用户在注册页面输入激活码完成注册</li>
            </ol>
        </div>
        
        <div class="admin-footer">
            <a href="host.html">← 返回主持人端</a>
        </div>
    </div>

    <script>
        function generateActivationCode(machineCode) {
            let code = '';
            let seed = 0;
            for (let i = 0; i < machineCode.length; i++) {
                seed += machineCode.charCodeAt(i);
            }
            for (let i = 0; i < 4; i++) {
                let group = '';
                for (let j = 0; j < 4; j++) {
                    seed = (seed * 9301 + 49297) % 233280;
                    const randomValue = seed / 233280;
                    const charCode = Math.floor(randomValue * 36);
                    group += charCode.toString(36).toUpperCase();
                }
                code += (i > 0 ? '-' : '') + group;
            }
            return code;
        }
        
        function generateCode() {
            const machineCode = document.getElementById('machineCode').value.trim().toUpperCase();
            if (!machineCode) {
                alert('请输入机器码');
                return;
            }
            if (!machineCode.startsWith('MC')) {
                alert('机器码格式不正确，应以 MC 开头');
                return;
            }
            const activationCode = generateActivationCode(machineCode);
            document.getElementById('activationCode').textContent = activationCode;
            document.getElementById('codeDisplay').style.display = 'block';
            document.getElementById('copyBtn').style.display = 'block';
        }
        
        function copyCode() {
            const code = document.getElementById('activationCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                alert('激活码已复制！');
            }).catch(err => {
                prompt('请手动复制:', code);
            });
        }
        
        function resetForm() {
            document.getElementById('machineCode').value = '';
            document.getElementById('codeDisplay').style.display = 'none';
            document.getElementById('copyBtn').style.display = 'none';
        }
    </script>
</body>
</html>
